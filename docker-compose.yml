services:
  postgres:
    image: postgres:16-alpine
    container_name: application-tracker-postgres
    environment:
      POSTGRES_DB: application_tracker
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d application_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: application-tracker-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/application_tracker
      SPRING_DATASOURCE_USERNAME: app_user
      SPRING_DATASOURCE_PASSWORD: app_password
      JWT_SECRET: change-this-local-docker-secret-before-production
    ports:
      - "8080:8080"

volumes:
  postgres-data:
